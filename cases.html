<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史命例 · 命理学数字实验室</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── 朝代时间线 ── */
    .era-section { margin-bottom: 48px; }
    .era-header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 20px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .era-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 16px;
      border-radius: var(--radius-pill);
      background: var(--gold-dim);
      border: 1px solid var(--border-gold);
      font-size: 0.85rem; font-weight: 600; color: var(--gold);
    }
    .era-badge::before {
      content: ''; width: 8px; height: 8px;
      background: var(--gold); border-radius: 50%;
    }
    .era-year { font-size: 0.8rem; color: var(--text-tertiary); }

    /* ── 案例卡片 ── */
    .cases-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }
    .case-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      cursor: pointer;
      transition: all var(--duration) var(--ease);
      display: flex; flex-direction: column; gap: 12px;
      position: relative;
    }
    .case-card:hover {
      border-color: var(--border-gold);
      background: var(--bg-card-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-gold);
    }
    .case-card.selected {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px var(--gold), var(--shadow-gold);
    }

    .case-card__header {
      display: flex; align-items: center; gap: 14px;
    }
    .case-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dim), rgba(201,168,76,0.05));
      border: 2px solid var(--border-gold);
      display: grid; place-items: center;
      font-size: 1.3rem; font-weight: 700; color: var(--gold);
      flex-shrink: 0;
    }
    .case-name { font-size: 1.15rem; font-weight: 700; }
    .case-desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; }

    .case-meta {
      display: flex; gap: 12px; flex-wrap: wrap;
      font-size: 0.78rem; color: var(--text-tertiary);
    }
    .case-meta span { display: inline-flex; align-items: center; gap: 4px; }

    .case-pillars-mini {
      display: flex; gap: 4px;
    }
    .mini-pillar {
      flex: 1; text-align: center;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 6px 2px;
    }
    .mini-pillar .s { font-size: 0.95rem; font-weight: 700; color: var(--gold); line-height: 1.2; }
    .mini-pillar .b { font-size: 0.95rem; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
    .mini-pillar .l { font-size: 0.6rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; }
    .mini-pillar .wx {
      font-size: 0.6rem; display: inline-block; margin: 0 1px;
    }

    .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .card-tags .tag { font-size: 0.72rem; padding: 2px 8px; }

    /* ── 详情面板 ── */
    .detail-panel {
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-xl);
      padding: 40px;
      box-shadow: var(--shadow-gold);
      animation: fadeUp 0.4s var(--ease) both;
      margin-bottom: 48px;
    }
    .detail-panel.hidden { display: none; }
    .detail-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 24px;
      margin-bottom: 28px; flex-wrap: wrap;
    }
    .detail-name { font-size: 2rem; font-weight: 700; margin-bottom: 4px; }
    .detail-era-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      background: var(--gold-dim);
      font-size: 0.78rem; color: var(--gold); font-weight: 600;
    }
    .analysis-box {
      background: var(--bg-secondary);
      border-left: 3px solid var(--gold);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 16px 20px;
      margin: 20px 0;
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }
    .birth-info {
      display: flex; gap: 20px; flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .birth-info-item { font-size: 0.85rem; }
    .birth-info-item span { color: var(--text-tertiary); margin-right: 4px; }
    .detail-source {
      margin-top: 16px; font-size: 0.8rem; color: var(--text-tertiary);
      font-style: italic;
    }

    /* ── 对比功能 ── */
    .compare-bar {
      position: sticky; bottom: 24px; z-index: 50;
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-pill);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      max-width: 600px; margin: 0 auto;
      animation: fadeUp 0.3s ease both;
    }
    .compare-bar.hidden { display: none; }
    .compare-bar__text { flex: 1; font-size: 0.9rem; color: var(--text-secondary); }
    .compare-bar__count { color: var(--gold); font-weight: 700; }

    /* ── 筛选按钮行 ── */
    .filter-bar {
      margin-bottom: 24px;
    }
    .filter-group {
      margin-bottom: 12px;
    }
    .filter-group__label {
      font-size: 0.72rem; color: var(--text-tertiary);
      letter-spacing: 0.04em; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .filter-chips {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .filter-chip {
      padding: 5px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--bg-card);
      font-size: 0.8rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--duration) var(--ease);
    }
    .filter-chip:hover, .filter-chip.active {
      border-color: var(--border-gold);
      color: var(--gold);
      background: var(--gold-dim);
    }
    .filter-chip[data-type="era"].active {
      border-color: var(--gold);
      background: var(--gold-dim);
    }

    /* ── 工具行 ── */
    .toolbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; flex-wrap: wrap; gap: 8px;
    }
    .toolbar .count {
      font-size: 0.85rem; color: var(--text-tertiary);
    }
    .toolbar .count em { font-style: normal; color: var(--gold); font-weight: 600; }

    /* ── 对比表格 ── */
    .compare-view {
      display: none;
      animation: fadeIn 0.3s ease;
      margin-bottom: 48px;
    }
    .compare-view.active { display: block; }
    .compare-table { width: 100%; font-size: 0.85rem; }
    .compare-table th {
      font-weight: 600; color: var(--gold);
      min-width: 80px;
    }
    .compare-table td { vertical-align: top; }
    .compare-table .compare-label {
      color: var(--text-tertiary);
      white-space: nowrap;
      width: 80px;
    }
    .compare-table .pillar-group {
      display: inline-flex; gap: 4px;
    }
    .compare-table .pillar-group .p-box {
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 4px 8px;
      text-align: center;
      font-size: 0.85rem;
    }

    /* ── 朝代索引条 ── */
    .era-index {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-bottom: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .era-index a {
      font-size: 0.75rem; color: var(--text-tertiary);
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      border: 1px solid transparent;
      transition: all var(--duration) var(--ease);
      text-decoration: none;
    }
    .era-index a:hover {
      border-color: var(--border-gold);
      color: var(--gold);
    }

    /* ── 动画 ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 768px) {
      .cases-grid {
        grid-template-columns: 1fr;
      }
      .detail-panel { padding: 24px; }
      .compare-table { font-size: 0.75rem; }
      .compare-table .pillar-group .p-box { padding: 2px 4px; font-size: 0.75rem; }
    }
  </style>
</head>

  <div class="nav__logo">
    <div class="nav__logo-icon">☯</div>

<div class="page-header">
  <div class="page-header__label">Historical Cases</div>
  <h1 class="display-lg">历史命例</h1>
  <p class="body-lg text-secondary" style="margin-top:12px; max-width:560px; margin-left:auto; margin-right:auto;">
    横跨春秋至民国，<span style="color:var(--gold)">14个朝代</span>各一位代表性历史人物。 
    八字数据来自史料推算与学界研究成果，命理分析供学术参考。

<main style="padding: 0 0 96px;">
  <div class="container">

    <!-- 筛选 -->
    <div class="filter-bar" id="filter-bar"></div>

    <!-- 工具行 -->
    <div class="toolbar">
      <div class="count">共 <em id="cases-total">0</em> 位历史人物 · <em id="eras-total">0</em> 个朝代</div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" id="btn-compare" style="display:none" onclick="showCompare()">对比选中</button>
        <button class="btn btn-secondary" onclick="clearSelection()">清除选择</button>
      </div>

    <!-- 朝代索引 -->
    <div class="era-index" id="era-index"></div>

    <!-- 案例列表（按朝代分组） -->
    <div id="cases-container"></div>

    <!-- 详情面板 -->
    <div class="detail-panel hidden" id="detail-panel">
      <div class="detail-header">
        <div>
          <div class="detail-name" id="det-name"></div>
          <div id="det-era-badge"></div>
          <div class="birth-info" id="det-birth"></div>
          <div id="det-tags"></div>
        </div>
        <button class="btn btn-ghost" onclick="document.getElementById('detail-panel').classList.add('hidden')">关闭 ✕</button>
      </div>
      <p class="body-sm text-secondary" style="margin-bottom:20px;" id="det-desc"></p>

      <div class="pillars" id="det-pillars" style="margin-bottom:0"></div>

      <div class="analysis-box" id="det-analysis"></div>
      <div id="det-wuxing"></div>
      <div class="detail-source" id="det-source"></div>
    </div>

    <!-- 对比视图 -->
    <div class="compare-view" id="compare-view">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
        <h2 class="headline">命例对比</h2>
        <button class="btn btn-ghost" onclick="document.getElementById('compare-view').classList.remove('active')">关闭对比</button>
      </div>
      <div class="table-wrap">
        <table class="compare-table">
          <thead id="cmp-head"></thead>
          <tbody id="cmp-body"></tbody>
        </table>
      </div>
    </div>

  </div>
</main>

<!-- 对比栏 -->
<div class="compare-bar hidden" id="compare-bar">
  <div class="compare-bar__text">已选 <span class="compare-bar__count" id="cmp-count">0</span> 个命例</div>
  <button class="btn btn-primary" onclick="showCompare()">开始对比</button>
  <button class="btn btn-secondary" onclick="clearSelection()">清除</button>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer__logo">命理学数字实验室 · <em>Mingli Lab</em></div>

  </div>
</footer>

<script src="js/bazi.js"></script>
<script src="js/main.js"></script>
<script>
(function() {
  'use strict';

  let allCases = [];
  let selectedIds = new Set();
  let activeEraFilter = '';
  let activeTagFilter = '';

  const WX_COLOR = ML.WX_COLOR;

  // ── 朝代时间线顺序 ──
  const ERA_ORDER = ['商','周','春秋','战国','秦代','汉代','三国','晋代','南北朝','隋代','唐代','宋代','元代','明代','清代','民国','近现代'];

  // ── 加载数据 ──
  async function loadCases() {
    try {
      const r = await fetch('data/cases.json');
      const data = await r.json();
      allCases = data.cases || [];
    } catch(e) {
      allCases = getBuiltinFallback();
    }
    init();
  }

  function getBuiltinFallback() {
    return [{
      id:'confucius', name:'孔子',
      birth:{year:-550,month:10,day:9,hour:7},
      gender:'male', era:'春秋',
      tags:['历史人物','思想家'],
      bazi:{year:{stem:'庚',branch:'戌'},month:{stem:'戊',branch:'戌'},day:{stem:'庚',branch:'子'},hour:{stem:'戊',branch:'辰'}},
      analysis:'日主庚金生于戌月，土旺生金，身旺。万世师表。',
      source:'《史记·孔子世家》'
    }];
  }

  // ── 初始化 ──
  function init() {
    renderFilterBar();
    renderEraIndex();
    renderCases();
    updateCounts();
  }

  // ── 获取所有唯一的 era 和 tag ──
  function getAllEras() {
    const eras = new Set();
    allCases.forEach(c => { if (c.era) eras.add(c.era); });
    return Array.from(eras).sort((a,b) => ERA_ORDER.indexOf(a) - ERA_ORDER.indexOf(b) || a.localeCompare(b));
  }

  function getAllTags() {
    const tags = new Set();
    allCases.forEach(c => (c.tags||[]).forEach(t => tags.add(t)));
    return Array.from(tags);
  }

  // ── 渲染筛选条 ──
  function renderFilterBar() {
    const bar = document.getElementById('filter-bar');
    const eras = getAllEras();
    const tags = getAllTags();

    let html = '<div class="filter-group"><div class="filter-group__label">朝 代</div><div class="filter-chips" id="era-chips">';
    html += `<div class="filter-chip active" data-type="era" data-value="">全部</div>`;
    eras.forEach(e => {
      html += `<div class="filter-chip" data-type="era" data-value="${e}">${e}</div>`;
    });
    html += '</div></div>';

    html += '<div class="filter-group"><div class="filter-group__label">类 型</div><div class="filter-chips" id="tag-chips">';
    html += `<div class="filter-chip active" data-type="tag" data-value="">全部</div>`;
    tags.forEach(t => {
      html += `<div class="filter-chip" data-type="tag" data-value="${t}">${t}</div>`;
    });
    html += '</div></div>';

    bar.innerHTML = html;

    // 事件绑定
    bar.addEventListener('click', e => {
      const chip = e.target.closest('.filter-chip');
      if (!chip) return;
      const type = chip.dataset.type;
      const val = chip.dataset.value;

      if (type === 'era') {
        document.querySelectorAll('#era-chips .filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeEraFilter = val;
      } else if (type === 'tag') {
        document.querySelectorAll('#tag-chips .filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeTagFilter = val;
      }
      renderCases();
      updateCounts();
    });
  }

  // ── 朝代索引 ──
  function renderEraIndex() {
    const idx = document.getElementById('era-index');
    const eras = getAllEras();
    idx.innerHTML = eras.map(e =>
      `<a href="#" onclick="scrollToEra('era-${e}');return false">${e}</a>`
    ).join('');
  }

  // ── 按朝代分组渲染 ──
  function renderCases() {
    const container = document.getElementById('cases-container');

    // 筛选
    let filtered = allCases;
    if (activeEraFilter) filtered = filtered.filter(c => c.era === activeEraFilter);
    if (activeTagFilter) filtered = filtered.filter(c => (c.tags||[]).includes(activeTagFilter));

    // 按朝代分组
    const eras = getAllEras().filter(e => filtered.some(c => c.era === e));
    
    if (filtered.length === 0) {
      container.innerHTML = '<div class="body-lg text-secondary text-center" style="padding:60px 0;">没有匹配的命例，试试其他筛选条件</div>';
      return;
    }

    // 如果按朝代筛选或者结果较少，则平铺显示（不分组）
    if (activeEraFilter || eras.length <= 1) {
      container.innerHTML = renderCardGrid(filtered);
      return;
    }

    // 按朝代分组
    let html = '';
    eras.forEach(era => {
      const casesInEra = filtered.filter(c => c.era === era);
      const years = casesInEra.map(c => c.birth.year).filter(y => y);
      const yearRange = years.length > 0
        ? `${Math.min(...years)}年 — ${Math.max(...years)}年`
        : '';
      
      html += `<div class="era-section" id="era-${era}">`;
      html += `<div class="era-header">`;
      html += `<div class="era-badge">${era}</div>`;
      html += `<span class="era-year">${yearRange} · ${casesInEra.length}位</span>`;
      html += `</div>`;
      html += renderCardGrid(casesInEra);
      html += `</div>`;
    });

    container.innerHTML = html;
  }

  function renderCardGrid(list) {
    return `<div class="cases-grid">${list.map(c => renderCard(c)).join('')}</div>`;
  }

  function renderCard(c) {
    const bz = c.bazi;
    const sel = selectedIds.has(c.id);
    const male = c.gender === 'male';

    return `<div class="case-card ${sel ? 'selected' : ''}"
                data-id="${c.id}"
                onclick="handleCardClick(event, '${c.id}')">
      <div class="case-card__header">
        <div class="case-avatar">${c.name[0]}</div>
        <div style="flex:1">
          <div class="case-name">${c.name}</div>
          <div class="case-meta">
            <span>${c.era}</span>
            <span>${Math.abs(c.birth.year)}年${c.birth.year < 0 ? 'BC' : ''}</span>
            <span>${male ? '男' : '女'}</span>
          </div>
        </div>
        <div style="display:flex;gap:4px;align-items:center;">
          <span class="tag" style="padding:2px 8px;font-size:0.72rem;">
            ${['年','月','日','时'].map((l,i) => l).join('')}
          </span>
        </div>
      </div>
      <div class="case-desc">${c.description}</div>
      <div class="case-pillars-mini">
        ${['year','month','day','hour'].map((k,i) => {
          const p = bz[k];
          const sw = BAZI.WUXING_TG[BAZI.TIANGAN.indexOf(p.stem)];
          const bw = BAZI.WUXING_DZ[BAZI.DIZHI.indexOf(p.branch)];
          return `<div class="mini-pillar">
            <div class="l">${['年','月','日','时'][i]}</div>
            <div class="s" style="color:${WX_COLOR[sw]}">${p.stem}</div>
            <div class="b">${p.branch}</div>
            <div><span class="wx" style="color:${WX_COLOR[sw]}">${sw}</span><span class="wx" style="color:${WX_COLOR[bw]}">${bw}</span></div>
          </div>`;
        }).join('')}
      </div>
      <div class="card-tags">
        ${(c.tags||[]).map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
    </div>`;
  }

  // ── 更新计数 ──
  function updateCounts() {
    let filtered = allCases;
    if (activeEraFilter) filtered = filtered.filter(c => c.era === activeEraFilter);
    if (activeTagFilter) filtered = filtered.filter(c => (c.tags||[]).includes(activeTagFilter));
    
    const uniqueEras = new Set(filtered.map(c => c.era));
    document.getElementById('cases-total').textContent = filtered.length;
    document.getElementById('eras-total').textContent = uniqueEras.size + '个';
  }

  // ── 卡片点击 ──
  window.handleCardClick = function(e, id) {
    if (e.ctrlKey || e.metaKey) {
      toggleSelect(id);
      return;
    }
    openDetail(id);
  };

  function toggleSelect(id) {
    if (selectedIds.has(id)) selectedIds.delete(id);
    else selectedIds.add(id);
    updateCompareBar();
    renderCases();
  }

  function updateCompareBar() {
    const bar = document.getElementById('compare-bar');
    const btn = document.getElementById('btn-compare');
    const count = selectedIds.size;
    document.getElementById('cmp-count').textContent = count;
    if (count >= 2) {
      bar.classList.remove('hidden');
      btn.style.display = '';
    } else {
      bar.classList.add('hidden');
      btn.style.display = 'none';
    }
  }

  window.clearSelection = function() {
    selectedIds.clear();
    updateCompareBar();
    document.getElementById('compare-view').classList.remove('active');
    renderCases();
  };

  // ── 详情 ──
  function openDetail(id) {
    const c = allCases.find(x => x.id === id);
    if (!c) return;
    const bz = c.bazi;
    const male = c.gender === 'male';

    document.getElementById('det-name').textContent = c.name;
    document.getElementById('det-era-badge').innerHTML = c.era
      ? `<div class="detail-era-badge">${c.era}</div>` : '';
    document.getElementById('det-desc').textContent = c.description;

    document.getElementById('det-birth').innerHTML = `
      <div class="birth-info-item"><span>出生</span>${Math.abs(c.birth.year)}年${c.birth.year < 0 ? 'BC' : ''} ${c.birth.month}月${c.birth.day}日 ${c.birth.hour}时</div>
      <div class="birth-info-item"><span>性别</span>${male ? '男' : '女'}</div>
      <div class="birth-info-item"><span>日主</span>${bz.day.stem}（${BAZI.WUXING_TG[BAZI.TIANGAN.indexOf(bz.day.stem)]}）</div>
    `;

    document.getElementById('det-tags').innerHTML = (c.tags||[]).map(t => `<span class="tag" style="margin-right:6px">${t}</span>`).join('');

    const pillarsEl = document.getElementById('det-pillars');
    const pillarKeys = ['year','month','day','hour'];
    const pillarLabels = ['年柱','月柱','日柱','时柱'];
    pillarsEl.innerHTML = pillarKeys.map((k, i) => {
      const p = bz[k];
      const stemWX = BAZI.WUXING_TG[BAZI.TIANGAN.indexOf(p.stem)];
      const brWX   = BAZI.WUXING_DZ[BAZI.DIZHI.indexOf(p.branch)];
      const shishen = i === 2 ? '日主' : BAZI.getShishen(BAZI.TIANGAN.indexOf(bz.day.stem), BAZI.TIANGAN.indexOf(p.stem));
      return `
        <div class="pillar">
          <div class="pillar__label">${pillarLabels[i]} · ${shishen}</div>
          <div class="pillar__stem" style="color:${WX_COLOR[stemWX] || 'var(--gold)'}">${p.stem}</div>
          <div class="pillar__branch">${p.branch}</div>
          <div class="pillar__element">
            <span style="color:${WX_COLOR[stemWX]}">${stemWX}</span>
            <span class="text-tertiary"> / </span>
            <span style="color:${WX_COLOR[brWX]}">${brWX}</span>
          </div>
        </div>`;
    }).join('');

    document.getElementById('det-analysis').textContent = c.analysis;
    document.getElementById('det-source').textContent = c.source ? `参考来源：${c.source}` : '';

    document.getElementById('detail-panel').classList.remove('hidden');
    document.getElementById('detail-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── 对比 ──
  window.showCompare = function() {
    const cases = allCases.filter(c => selectedIds.has(c.id));
    if (cases.length < 2) {
      ML.toast('请选中至少2个命例（Ctrl+点击）', 'error');
      return;
    }

    const pillarKeys = ['year','month','day','hour'];
    const pillarLabels = ['年柱','月柱','日柱','时柱'];

    const head = document.getElementById('cmp-head');
    const body = document.getElementById('cmp-body');

    head.innerHTML = `<tr>
      <th style="width:80px">项目</th>
      ${cases.map(c => `<th>${c.name}<br><span style="font-size:0.7rem;color:var(--text-tertiary);font-weight:400;">${c.era}</span></th>`).join('')}
    </tr>`;

    const rows = [
      { label: '朝代', fn: c => c.era || '—' },
      { label: '出生', fn: c => `${Math.abs(c.birth.year)}年${c.birth.year<0?'BC':''} ${c.birth.month}月${c.birth.day}日` },
      { label: '性别', fn: c => c.gender === 'male' ? '男' : '女' },
      ...pillarKeys.map((k, i) => ({
        label: pillarLabels[i],
        fn: c => {
          const p = c.bazi[k];
          const wx = BAZI.WUXING_TG[BAZI.TIANGAN.indexOf(p.stem)];
          return `<span class="pillar-group">
            <span class="p-box"><span style="color:${WX_COLOR[wx]}">${p.stem}</span></span>
            <span class="p-box">${p.branch}</span>
          </span>`;
        }
      })),
      { label: '日主', fn: c => {
        const s = c.bazi.day.stem;
        const wx = BAZI.WUXING_TG[BAZI.TIANGAN.indexOf(s)];
        return `<span style="color:${WX_COLOR[wx]};font-weight:700;">${s}（${wx}）</span>`;
      }},
      { label: '格局', fn: c => {
        const analysis = c.analysis || '';
        const match = analysis.match(/格局([^，。；]+)/);
        return match ? match[0] : '—';
      }},
      { label: '类型', fn: c => (c.tags||[]).slice(0,2).join(' · ') || '—' }
    ];

    body.innerHTML = rows.map(row => `
      <tr>
        <td class="compare-label">${row.label}</td>
        ${cases.map(c => `<td>${row.fn(c)}</td>`).join('')}
      </tr>
    `).join('');

    document.getElementById('compare-view').classList.add('active');
    document.getElementById('compare-view').scrollIntoView({ behavior: 'smooth' });
  };

  // ── 滚到朝代 ──
  window.scrollToEra = function(id) {
    const el = document.getElementById(id);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      // 取消选中所有朝代筛选
      document.querySelectorAll('#era-chips .filter-chip').forEach(c => c.classList.remove('active'));
      document.querySelector('#era-chips .filter-chip[data-value=""]').classList.add('active');
      activeEraFilter = '';
      renderCases();
      updateCounts();
    }
  };

  // ── 暴露给window ──
  window.openDetail = openDetail;

  // ── 启动 ──
  loadCases();

})();
</script>
</body>
</html>
